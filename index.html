<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossa História</title>

    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

    <!-- Estilo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Nossos Momentos</h1>
        <p>Cada segundo ao seu lado é um presente.</p>
    </header>

    <p class="dedication">
        Para mulher mais linda do mundo.
    </p>

    <div class="divider">❦</div>

    <main class="container">
        <div class="video-grid">

            <div class="moment-card">
                <div class="video-wrapper">
                    <video controls>
                        <source src="video_1.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="moment-info">
                    <h3>moment 1</h3>
                    <p></p>
                </div>
            </div>

            <div class="moment-card">
                <div class="video-wrapper">
                    <video controls>
                        <source src="video_2.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="moment-info">
                    <h3>moment 2</h3>
                    <p></p>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <div id="counter">Carregando momentos...</div>
        <p class="footer-text">Com amor, para Jezz </p>
    </footer>

    <!-- Música opcional -->
    <!--
    <audio autoplay loop>
        <source src="music.mp3" type="audio/mp3">
    </audio>
    -->

    <script src="script.js"></script>
</body>
</html>
